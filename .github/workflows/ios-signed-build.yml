name: iOS Signed Build

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "Xcode export method"
        required: true
        default: "app-store"
        type: choice
        options:
          - app-store
          - ad-hoc
          - development
          - enterprise
      upload_testflight:
        description: "Upload the exported app-store IPA to TestFlight"
        required: true
        default: false
        type: boolean
      build_name:
        description: "Marketing version, for example 1.0.0"
        required: true
        default: "1.0.0"
      build_number:
        description: "Build number. Defaults to the workflow run number when blank."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-ios:
    name: Build signed iOS IPA
    runs-on: macos-15
    timeout-minutes: 45

    env:
      FLUTTER_PROJECT_DIR: ProcareDownloader.Flutter
      KEYCHAIN_PATH: /tmp/procare-ios-signing.keychain-db
      CERTIFICATE_PATH: /tmp/ios_distribution.p12
      PROFILE_PATH: /tmp/profile.mobileprovision
      PROFILE_PLIST_PATH: /tmp/profile.plist
      EXPORT_OPTIONS_PATH: /tmp/ExportOptions.plist
      API_KEY_PATH: /tmp/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Validate signing inputs
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Decode signing assets
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          outputs = {
              "APP_STORE_CONNECT_API_KEY_BASE64": Path(os.environ["API_KEY_PATH"]),
              "IOS_DISTRIBUTION_CERTIFICATE_BASE64": Path(os.environ["CERTIFICATE_PATH"]),
              "IOS_PROVISIONING_PROFILE_BASE64": Path(os.environ["PROFILE_PATH"]),
          }

          for env_name, path in outputs.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(base64.b64decode(os.environ[env_name]))
          PY

          mkdir -p "$HOME/private_keys"
          cp "$API_KEY_PATH" "$HOME/private_keys/$(basename "$API_KEY_PATH")"
          chmod 600 "$API_KEY_PATH" "$HOME/private_keys/$(basename "$API_KEY_PATH")"

      - name: Install Apple signing certificate
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        shell: bash
        run: |
          set -euo pipefail
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST_PATH")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST_PATH")
          APPLICATION_IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST_PATH")
          BUNDLE_ID="${APPLICATION_IDENTIFIER#${TEAM_ID}.}"

          if [[ "$BUNDLE_ID" == "$APPLICATION_IDENTIFIER" || "$BUNDLE_ID" == *"*"* ]]; then
            echo "The provisioning profile must use an explicit app identifier. Found: $APPLICATION_IDENTIFIER" >&2
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_PROFILE_UUID=$PROFILE_UUID"
            echo "IOS_PROFILE_NAME=$PROFILE_NAME"
            echo "IOS_TEAM_ID=$TEAM_ID"
            echo "IOS_BUNDLE_ID=$BUNDLE_ID"
          } >> "$GITHUB_ENV"

      - name: Create export options
        shell: bash
        run: |
          set -euo pipefail
          cat > "$EXPORT_OPTIONS_PATH" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$IOS_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST
          plutil -lint "$EXPORT_OPTIONS_PATH"

      - name: Resolve dependencies and test
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          flutter --version
          flutter pub get
          flutter test --reporter compact

      - name: Prepare Flutter iOS artifacts
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          flutter build ios \
            --release \
            --no-codesign \
            --build-name "${{ inputs.build_name }}" \
            --build-number "$BUILD_NUMBER"

      - name: Archive signed app
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        env:
          IOS_SIGNING_CERTIFICATE_NAME: ${{ secrets.IOS_SIGNING_CERTIFICATE_NAME }}
        run: |
          set -euo pipefail
          SIGNING_IDENTITY="${IOS_SIGNING_CERTIFICATE_NAME:-Apple Distribution}"

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/archive/Runner.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export IPA
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          ls -la build/ios/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: procare-downloader-ios-${{ inputs.export_method }}
          path: ProcareDownloader.Flutter/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ inputs.upload_testflight && inputs.export_method == 'app-store' }}
        working-directory: ${{ env.FLUTTER_PROJECT_DIR }}
        shell: bash
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/ios/ipa -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA found to upload." >&2
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up signing files
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

          secure_remove() {
            for file in "$@"; do
              if [[ -f "$file" ]]; then
                rm -P "$file" 2>/dev/null || rm -f "$file"
              fi
            done
          }

          secure_remove \
            "$API_KEY_PATH" \
            "$CERTIFICATE_PATH" \
            "$PROFILE_PATH" \
            "$PROFILE_PLIST_PATH" \
            "$EXPORT_OPTIONS_PATH"

          secure_remove "$HOME/private_keys"/AuthKey_*.p8

          if [[ -n "${IOS_PROFILE_UUID:-}" ]]; then
            secure_remove "$HOME/Library/MobileDevice/Provisioning Profiles/$IOS_PROFILE_UUID.mobileprovision"
          fi
